# Ge-Prime-Matrix + static landing page on schlawiener.space
# Joins the existing traefik-public network (Catpocalypse stack).

name: ge-prime-matrix

services:
  site:
    image: nginx:1.27-alpine
    container_name: schlawiener-site
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=8m
      - /var/run:size=1m
    volumes:
      - ./site:/usr/share/nginx/html:ro
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.site.rule=Host(`schlawiener.space`) && (Path(`/`) || Path(`/profil.html`) || Path(`/style.css`))
      - traefik.http.routers.site.entrypoints=websecure
      - traefik.http.routers.site.tls.certresolver=letsencrypt
      - traefik.http.routers.site.priority=50
      - traefik.http.routers.site.middlewares=secure-headers@file
      - traefik.http.services.site.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3

  gpm:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ge-prime-matrix:${APP_VERSION:-latest}
    container_name: gpm
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GE_PRIME_ENV: production
      PORT: "5000"
      HOST: "0.0.0.0"
      OPEN_BROWSER: "0"
      PYTHONUNBUFFERED: "1"
    volumes:
      - gpm_data:/app/Ge-Prime-Matrix/data
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.gpm.rule=Host(`schlawiener.space`) && PathPrefix(`/GPM`)
      - traefik.http.routers.gpm.entrypoints=websecure
      - traefik.http.routers.gpm.tls.certresolver=letsencrypt
      - traefik.http.routers.gpm.priority=100
      - traefik.http.routers.gpm.middlewares=gpm-redirect-slash,gpm-stripprefix,secure-headers@file
      - traefik.http.middlewares.gpm-redirect-slash.redirectregex.regex=^https?://([^/]+)/GPM$$
      - traefik.http.middlewares.gpm-redirect-slash.redirectregex.replacement=https://$${1}/GPM/
      - traefik.http.middlewares.gpm-redirect-slash.redirectregex.permanent=true
      - traefik.http.middlewares.gpm-stripprefix.stripprefix.prefixes=/GPM
      - traefik.http.services.gpm.loadbalancer.server.port=5000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  traefik-public:
    name: traefik-public
    external: true

volumes:
  gpm_data:
    name: gpm_data
