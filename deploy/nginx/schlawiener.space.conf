# Nginx site config for schlawiener.space
# Install: sudo cp deploy/nginx/schlawiener.space.conf /etc/nginx/sites-available/schlawiener.space
#          sudo ln -sf /etc/nginx/sites-available/schlawiener.space /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# Update PROTO_PORT and CAT_PORT after: docker ps
# GPM runs on host port 5000 via deploy/docker-compose.yml

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream gpm_backend {
    server 127.0.0.1:5000;
}

# Set these to match existing docker publish ports (docker ps)
upstream protosarche_backend {
    server 127.0.0.1:8081;
}

upstream catpocalypse_backend {
    server 127.0.0.1:8082;
}

server {
    listen 80;
    listen [::]:80;
    server_name schlawiener.space www.schlawiener.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name schlawiener.space www.schlawiener.space;

    # Certbot paths (adjust if using different tool)
    ssl_certificate     /etc/letsencrypt/live/schlawiener.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schlawiener.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/schlawiener;
    index index.html;

    # Landing page and profile
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /GPM {
        return 301 /GPM/;
    }

    location /GPM/ {
        proxy_pass http://gpm_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /protosarche/ {
        proxy_pass http://protosarche_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /catpocalypse/ {
        proxy_pass http://catpocalypse_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
